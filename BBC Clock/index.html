<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BBC One Clock (1997-2002) - Ticking</title>
    <style>
        :root { --w: 1440; --h: 1080; }
        html, body {
            height: 100%;
            margin: 0;
            background: #000;
            display: grid;
            place-items: center;
            overflow: hidden;
        }
        .frame {
            position: relative;
            background: #000;
            overflow: hidden;
            width: min(100vw, calc(100vh * 4 / 3));
            height: min(100vh, calc(100vw * 3 / 4));
            aspect-ratio: 4 / 3;
        }
        #clock {
            width: 100%;
            height: 100%;
            display: block;
        }
    </style>
</head>
<body>

    <div class="frame" id="frame">
        <canvas id="clock" width="1440" height="1080"></canvas>
    </div>

<script>
(() => {
    const W = 1440, H = 1080;
    const canvas = document.getElementById('clock');
    const ctx = canvas.getContext('2d');

    // --- Clock config with "Tick" physics ---
    const cfg = {
        colour: "#dedede",
        cx: W * 0.500,
        cy: 468,
        faceR: 255,
        barLen: 66,
        barTh1: 14,
        hubOuterR: 18, hubRingW: 14,
        hourLen: 170, hourW: 14,
        minLen: 246, minW: 14,
        secLen: 246, secW: 8, secTail: 70,

        // These settings control the "bounce" of the tick
        tick: {
            hold: 0.0,
            move: 0.1,    // How fast the hand moves (smaller = snappier)
            settle: 0.2,  // How long it vibrates after the move
            judderAmp: 0.02, 
            judderFreq: 12,
            judderDamp: 5
        }
    };

    const TAU = Math.PI * 2, HALF_PI = Math.PI / 2;

    // --- Physics engine for the "Step" motion ---
    function tickStep(t) {
        const tk = cfg.tick;
        const t1 = tk.hold;
        const t2 = tk.hold + tk.move;

        if (t < t1) return 0;
        if (t < t2) return (t - t1) / tk.move; // Smooth travel between seconds

        // The "Bounce" math
        const v = Math.min(1, (t - t2) / tk.settle);
        const wobble = (tk.judderAmp) * Math.sin(v * Math.PI * tk.judderFreq) * Math.exp(-tk.judderDamp * v);
        return 1 + wobble;
    }

    function drawMarkers(ctx, cx, cy, c, color) {
        ctx.fillStyle = color;
        for (let i = 0; i < 12; i++) {
            const a = (i / 12) * TAU - HALF_PI;
            const ux = Math.cos(a), uy = Math.sin(a);
            const px = cx + ux * c.faceR;
            const py = cy + uy * c.faceR;
            if ([1, 3, 5, 7, 9, 11].includes(i)) {
                ctx.beginPath(); ctx.arc(px, py, 10, 0, TAU); ctx.fill();
            } else {
                ctx.save(); ctx.translate(px, py); ctx.rotate(a);
                ctx.fillRect(-c.barLen * 0.35, -c.barTh1 / 2, c.barLen * 0.7, c.barTh1);
                ctx.restore();
            }
        }
    }

    function drawHand(ctx, cx, cy, ang, len, w, color) {
        ctx.save(); ctx.translate(cx, cy); ctx.rotate(ang);
        ctx.fillStyle = color; ctx.fillRect(0, -w / 2, len, w); ctx.restore();
    }

    function drawSecond(ctx, cx, cy, ang, len, tail, w, color) {
        ctx.save(); ctx.translate(cx, cy); ctx.rotate(ang);
        ctx.strokeStyle = color; ctx.lineWidth = w;
        ctx.beginPath(); ctx.moveTo(-tail, 0); ctx.lineTo(len, 0); ctx.stroke();
        ctx.restore();
    }

    function drawHub(ctx, cx, cy, outerR, ringW, color) {
        ctx.save(); ctx.translate(cx, cy);
        ctx.strokeStyle = color; ctx.lineWidth = ringW;
        ctx.beginPath(); ctx.arc(0, 0, outerR, 0, TAU); ctx.stroke();
        ctx.fillStyle = "#000";
        ctx.beginPath(); ctx.arc(0, 0, outerR - ringW / 2, 0, TAU); ctx.fill();
        ctx.restore();
    }

    let bg = new Image();
    bg.src = "bbc1_1997-2002.jpg"; 
    bg.onload = () => loop();

    function loop() {
        ctx.clearRect(0, 0, W, H);
        if (bg.complete) ctx.drawImage(bg, 0, 0, W, H);

        const now = new Date();
        const ms = now.getMilliseconds() / 1000;
        const sec = now.getSeconds(), min = now.getMinutes(), hr = now.getHours() % 12;

        // Apply the tick physics to the second hand
        const step = tickStep(ms);
        const aSec = ((sec + step) / 60) * TAU - HALF_PI;
        
        // Minutes and Hours still move smoothly (like the real clock)
        const aMin = ((min + sec / 60) / 60) * TAU - HALF_PI;
        const aHour = ((hr + min / 60) / 12) * TAU - HALF_PI;

        drawMarkers(ctx, cfg.cx, cfg.cy, cfg, cfg.colour);
        drawHand(ctx, cfg.cx, cfg.cy, aHour, cfg.hourLen, cfg.hourW, cfg.colour);
        drawHand(ctx, cfg.cx, cfg.cy, aMin, cfg.minLen, cfg.minW, cfg.colour);
        drawSecond(ctx, cfg.cx, cfg.cy, aSec, cfg.secLen, cfg.secTail, cfg.secW, cfg.colour);
        drawHub(ctx, cfg.cx, cfg.cy, cfg.hubOuterR, cfg.hubRingW, cfg.colour);

        requestAnimationFrame(loop);
    }
})();
</script>
</body>
</html>
